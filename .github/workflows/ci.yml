name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze (Dart)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter analyze --no-fatal-infos

  test-flutter:
    name: Unit Tests (Flutter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter test --reporter expanded

  test-proxy:
    name: Unit Tests (Node.js Proxy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: proxy/package-lock.json

      - run: npm ci

      - name: Check proxy syntax
        run: node -c proxy.js

      - name: Check proxy-debug syntax
        run: node -c proxy-debug.js

  build-web:
    name: Build Web
    if: github.event_name == 'push'
    needs: [analyze, test-flutter, test-proxy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter create --platforms web .

      - run: flutter build web --release

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  build-android:
    name: Build Android
    if: github.event_name == 'push'
    needs: [analyze, test-flutter, test-proxy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter create --platforms android .

      - run: flutter build apk --debug --split-per-abi

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk

  deploy-pages:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build-web
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
